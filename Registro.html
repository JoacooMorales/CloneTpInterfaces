<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
    <title>Login / Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">

        <div class="form-content">
            <div class="form-login">
                <form class="formulario" id="loginForm">
                    <label for="email">Email</label>
                    <input type="email" required>

                    <label for="password">Contraseña</label>
                    <input type="password" required>

                    <button type="submit">INICIAR SESION</button>

                    <div class="captcha">

                            <label>
                                <input type="checkbox">
                                <span class="checkmark"></span>
                            </label>

                        <div class="text">
                            I'm not a robot
                        </div>


                    </div>

                </form>


                <h2> ¿No tienes cuenta ? <span class="registrate" id="goToRegister">Registrate</span> </h2>
            </div>
            <div class="form-register">
                <img src="image.png" alt="fondo-login" class="imagen-form ">

                <form class="formulario" id="registerForm">
                    <label for="nombre">Nombre</label>
                    <input type="text" required>
                    <label for="apellido">Apellido</label>
                    <input type="text" required>
                    <label for="nickname">Nickname (opcional)</label>
                    <input type="text">
                    <label for="Edad">Edad</label>
                    <input type="number" required>
                    <label for="email">Email</label>
                    <input type="email" required>
                    <label for="contraseña">Contraseña</label>
                    <input type="password" required>
                    <label for="confirmar Contraseña">Confirmar Contraseña</label>
                    <input type="password" required>
                    <button type="submit">REGISTRAR</button>

                    <div class="captcha">

                        <div class="spinner">
                            <label>
                                <input type="checkbox">
                                <span class="checkmark"></span>
                            </label>
                        </div>

                        <div class="text">
                            I'm not a robot
                        </div>


                    </div>

                    <h2> ¿Ya tienes cuenta? <span class="iniciar-sesion" id="goToLogin">Iniciar sesion</span> </h2>
                </form>

            </div>

        </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
